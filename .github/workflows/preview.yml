name: Validate & Generate

# Runs on every push to main and on manual trigger.
# Validates XML and generates C code from the ui/ project.
#
# To preview the UI in the browser, open:
#   https://viewer.lvgl.io/?repo=bobjwatts/ev-dash-ui
# The viewer reads XML directly from the repo — no build step needed.

on:
  push:
    branches: [main, master]
    paths:
      - "ui/**"
      - ".github/workflows/preview.yml"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Download LVGL CLI
        run: |
          curl -L https://github.com/lvgl/lvgl_editor/releases/download/v1.2.1/LVGL_Pro_CLI-1.2.1-linux-mac.zip \
               -o lvgl-cli.zip
          unzip lvgl-cli.zip -d lvgl-cli
          node ./lvgl-cli/lved-cli.js -V

      - name: Validate & generate C from XML
        run: node ./lvgl-cli/lved-cli.js generate ui -ss

      - name: Upload generated C as artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-c
          path: |
            ui/**/*_gen.c
            ui/**/*_gen.h
          retention-days: 30
